name: Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  pytest:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q
